services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: skillproof
      POSTGRES_USER: skillproof
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U skillproof -d skillproof']
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://skillproof:${POSTGRES_PASSWORD}@db:5432/skillproof
      RESULTS_API_KEY: ${RESULTS_API_KEY:?set RESULTS_API_KEY in .env}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESULT_EMAIL_FROM: ${RESULT_EMAIL_FROM:-}
      AI_GATEWAY_API_KEY: ${AI_GATEWAY_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN in .env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  pgdata:
  caddy_data:
  caddy_config:
